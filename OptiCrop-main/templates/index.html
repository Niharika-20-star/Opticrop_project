<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>OptiCrop</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <div class="logo">
        <h1>🌱 OptiCrop</h1>
        <p>Smart Agricultural Production Optimization Engine</p>
    </div>

    <form action="/predict" method="POST" autocomplete="off">

        <label>Nitrogen (N)</label>
        <input
            type="number"
            name="N"
            placeholder="Enter Nitrogen value"
            required>

        <label>Phosphorus (P)</label>
        <input
            type="number"
            name="P"
            placeholder="Enter Phosphorus value"
            required>

        <label>Potassium (K)</label>
        <input
            type="number"
            name="K"
            placeholder="Enter Potassium value"
            required>

        <label>Temperature (°C)</label>
        <input
            type="number"
            step="any"
            name="temperature"
            placeholder="e.g. 26.5"
            required>

        <label>Humidity (%)</label>
        <input
            type="number"
            step="any"
            name="humidity"
            placeholder="e.g. 82"
            required>

        <label>Soil pH</label>
        <input
            type="number"
            step="any"
            name="ph"
            placeholder="e.g. 6.5"
            required>

        <label>Rainfall (mm)</label>
        <input
            type="number"
            step="any"
            name="rainfall"
            placeholder="e.g. 210"
            required>

        <button type="submit">
            🌾 Predict Crop
        </button>

    </form>

    {% if prediction %}
    <div class="result">
        <h2>Recommended Crop</h2>
        <h1>{{ prediction }}</h1>
    </div>
    {% endif %}

</div>

</body>
</html>
